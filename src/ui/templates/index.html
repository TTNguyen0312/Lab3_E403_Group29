<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallel Chatbot vs Agent UI</title>
    <link rel="stylesheet" href="/static/styles.css">

    <style>
        .row {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .column {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            background: #fafafa;
        }

        .title {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .final-box {
            border: 2px solid #4CAF50;
            padding: 10px;
            border-radius: 8px;
            background: #f6fff6;
            margin-bottom: 10px;
        }

        .trace-box {
            border: 2px solid #999;
            padding: 10px;
            border-radius: 8px;
            background: #f9f9f9;
            white-space: pre-wrap;
            font-family: monospace;
        }

        .user-input {
            margin-top: 20px;
        }
    </style>

    <script>
        function extractFinalAndTrace(text) {
            if (!text) return { final: "", trace: "" };

            const split = text.split("Final Answer:");

            if (split.length > 1) {
                return {
                    trace: split[0].trim(),
                    final: split[1].trim()
                };
            }

            return {
                trace: text,
                final: ""
            };
        }

        async function sendQuery() {
            const userInput = document.getElementById('userInput').value;

            // Call BOTH modes in parallel
            const [chatbotRes, agentRes] = await Promise.all([
                fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: "chatbot", input: userInput })
                }),
                fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: "agent", input: userInput })
                })
            ]);

            const chatbotData = await chatbotRes.json();
            const agentData = await agentRes.json();

            // ======================
            // 💬 CHATBOT PARSE
            // ======================
            let chatbotContent = chatbotData.response;

            if (typeof chatbotContent === 'object') {
                chatbotContent =
                    chatbotContent["content"] ||
                    chatbotContent["last_response"] ||
                    JSON.stringify(chatbotContent, null, 2);
            }

            // ======================
            // 🧠 AGENT PARSE
            // ======================
            let agentContent = agentData.response;

            if (typeof agentContent === 'object') {
                agentContent =
                    agentContent["last_response"] ||
                    JSON.stringify(agentContent, null, 2);
            }

            const { final, trace } = extractFinalAndTrace(agentContent);

            // ======================
            // 🎨 RENDER UI
            // ======================
            const container = document.getElementById('results');

            const row = document.createElement('div');
            row.className = 'row';

            // LEFT: Chatbot
            const chatbotCol = document.createElement('div');
            chatbotCol.className = 'column';

            const chatbotTitle = document.createElement('div');
            chatbotTitle.className = 'title';
            chatbotTitle.innerText = "💬 Chatbot";

            const chatbotBox = document.createElement('div');
            chatbotBox.className = 'final-box';
            chatbotBox.innerHTML = chatbotContent.replace(/\n/g, "<br>");

            chatbotCol.appendChild(chatbotTitle);
            chatbotCol.appendChild(chatbotBox);

            // RIGHT: Agent
            const agentCol = document.createElement('div');
            agentCol.className = 'column';

            const agentTitle = document.createElement('div');
            agentTitle.className = 'title';
            agentTitle.innerText = "🧠 Agent";

            const finalBox = document.createElement('div');
            finalBox.className = 'final-box';
            finalBox.innerHTML = (final || "No final answer").replace(/\n/g, "<br>");

            agentCol.appendChild(agentTitle);
            agentCol.appendChild(finalBox);
            
            // Combine
            row.appendChild(chatbotCol);
            row.appendChild(agentCol);

            container.appendChild(row);

            document.getElementById('userInput').value = '';
        }
    </script>
</head>

<body>
    <div class="container">
        <h1>⚡ Chatbot vs Agent Comparison</h1>

        <div class="user-input">
            <input type="text" id="userInput" placeholder="Type your query here" style="width: 70%;">
            <button onclick="sendQuery()">Compare</button>
        </div>

        <div id="results"></div>
    </div>
</body>
</html>
